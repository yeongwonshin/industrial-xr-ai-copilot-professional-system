version: "3.9"
services:
  api-gateway:
    image: fieldsense/api-gateway:dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://fieldsense:fieldsense@postgres:5432/fieldsense
      REDIS_URL: redis://redis:6379
  ai-orchestrator:
    image: fieldsense/ai-orchestrator:dev
    environment:
      VECTOR_DB_URL: http://vector-db:6333
      SAFETY_POLICY_URL: http://safety-policy:8082
  safety-policy:
    image: fieldsense/safety-policy:dev
    ports:
      - "8082:8082"
  retrieval-service:
    image: fieldsense/retrieval-service:dev
    environment:
      VECTOR_DB_URL: http://vector-db:6333
  edge-inference:
    image: fieldsense/edge-inference:dev
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fieldsense
      POSTGRES_PASSWORD: fieldsense
      POSTGRES_DB: fieldsense
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
